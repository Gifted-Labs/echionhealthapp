spring:
  application:
    name: echoin-health-backend
  
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:zA9FQW6nT7Jm8L3CkD5bX2p4R0YHUsN1eMZBqfGvVhEoK_iwSaPtdOcrxIyljA7}
  expiration: ${JWT_EXPIRATION:3600000}  # 1 hour in milliseconds
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}  # 24 hours in milliseconds
  issuer: ${JWT_ISSUER:echoin-health}

# Email Configuration
email:
  from: ${EMAIL_FROM:noreply@echoinhealth.com}
  resend:
    api-key: ${RESEND_API_KEY}
    api-url: https://api.resend.com/emails

# Application Configuration
app:
  base-url: ${BASE_URL:http://localhost:8080}
  verification-token:
    expiration-hours: ${TOKEN_VERIFICATION_HOURS:24}
  password-reset-token:
    expiration-hours: ${TOKEN_PASSWORD_RESET_HOURS:1}

# Logging
logging:
  level:
    com.giftedlabs.echoinhealthbackend: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# File Storage Configuration
storage:
  type: ${STORAGE_TYPE:railway}  # 'local' for development, 'railway' for production (default to railway)
  max-file-size: ${MAX_FILE_SIZE:52428800}  # 50MB in bytes
  allowed-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
  
  local:
    base-path: ${LOCAL_STORAGE_PATH:./vault-storage}
    
  railway:
    endpoint: ${RAILWAY_BUCKET_URL:}
    bucket: ${RAILWAY_BUCKET_NAME:}
    access-key: ${RAILWAY_ACCESS_KEY_ID:}
    secret-key: ${RAILWAY_SECRET_ACCESS_KEY:}
    region: ${RAILWAY_REGION:us-east-1}

# Multipart File Upload Configuration
spring.servlet.multipart:
  enabled: true
  max-file-size: 50MB
  max-request-size: 50MB
